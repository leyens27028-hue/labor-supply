version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: labor-supply-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: labor_supply_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: labor-supply-api
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: "postgresql://postgres:postgres_password_change_me@postgres:5432/labor_supply_db"
      JWT_SECRET: thay-bang-chuoi-bi-mat-rat-dai-va-phuc-tap
      JWT_EXPIRES_IN: 7d
    command: >
      sh -c "npx prisma migrate deploy && node src/server.js"

  frontend-build:
    image: node:20-alpine
    container_name: labor-supply-frontend-build
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_dist:/app/dist
    command: sh -c "npm ci && npm run build"

  nginx:
    image: nginx:alpine
    container_name: labor-supply-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend-build
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro

volumes:
  postgres_data:
  frontend_dist:

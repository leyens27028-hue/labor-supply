# Render Blueprint - Auto deploy toàn bộ stack
# Docs: https://docs.render.com/blueprint-spec

databases:
  - name: labor-supply-db
    plan: free
    databaseName: labor_supply_db
    user: appuser

services:
  # === BACKEND API ===
  - type: web
    name: labor-supply-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && node scripts/prepare-deploy.js && npx prisma generate && npx prisma db push --accept-data-loss
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: labor-supply-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d

  # === FRONTEND ===
  - type: web
    name: labor-supply-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://labor-supply-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
